{% extends "shared/base.html" %}
{% block title %}My Profile{% endblock %}
{% block page_title %}My Profile{% endblock %}
{% block sidebar_nav %}{% endblock %}
{% block content %}
<div class="card" style="max-width:500px;">
  <div class="card-title">👤 Profile Details</div>
  <form method="POST">
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" name="name" class="form-control" value="{{ user.name }}" required>
    </div>
    <div class="form-group">
      <label class="form-label">Phone</label>
      <input type="text" name="phone" class="form-control" value="{{ user.phone or '' }}">
    </div>
    <div class="form-group">
      <label class="form-label">Area</label>
      <input type="text" name="area" class="form-control" value="{{ user.area or '' }}">
    </div>
    <div class="form-group">
      <label class="form-label">City</label>
      <input type="text" name="city" class="form-control" value="{{ user.city or '' }}">
    </div>
    <button type="submit" class="btn btn-primary">Save Changes</button>
  </form>
</div>
{% endblock %}
